version: 2

updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      actions-minor:
        update-types:
          - "minor"
          - "patch"

  # Keep Maven dependencies up to date
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "deps"
    groups:
      maven-minor:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
