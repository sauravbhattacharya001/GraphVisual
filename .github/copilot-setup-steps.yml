# Copilot Setup Steps for GraphVisual
# This workflow installs dependencies and builds the project so GitHub Copilot
# coding agents (Claude, Codex) can autonomously work on issues and PRs.

name: "Copilot Setup"

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: mvn dependency:resolve -B -q

      - name: Compile project
        run: mvn compile -B

      - name: Run tests
        run: mvn test -B
