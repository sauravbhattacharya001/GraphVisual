# Copilot Coding Agent Setup Steps
# Runs before Copilot agents (Claude, Codex, etc.) work on issues and PRs.
# Installs dependencies and validates the build so agents can iterate autonomously.

steps:
  - name: Set up JDK 11
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "11"
      cache: maven

  - name: Install dependencies and compile
    run: ./mvnw dependency:resolve compile -B -q

  - name: Run tests
    run: ./mvnw test -B -q

  - name: Verify packaging
    run: ./mvnw package -DskipTests -B -q
